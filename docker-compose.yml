version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: babay_burger_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: babay_burger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS:-strongpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: babay_burger_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Bot ───────────────────────────────────────────────────────────────────────
  bot:
    build: .
    container_name: babay_burger_bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASS:-strongpassword}@db:5432/babay_burger
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
